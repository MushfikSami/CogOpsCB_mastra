# Jiggasha — Bengali passage retrieval service.
#
# /search has two modes (content-driven):
#   - Legacy single-query : POST {query, top_k} → raw cosine top-K.
#   - Multi-query         : POST {sub_queries, use_instruction: true, ...}
#                           → embed per sub → Qdrant top-K each → merge/dedupe
#                           → cosine threshold + token budget filter.

csv_path: "data.csv"
port: 10000

embedder:
  url_env: "EMBEDDER_URL"
  api_key_env: "EMBEDDER_API_KEY"
  model_env: "EMBEDDER_MODEL"
  dimension: 4096
  batch_size: 64
  timeout: 120

qdrant:
  url_env: "QDRANT_URL"
  collection: "bnwiki_chunks"
  distance: "Cosine"
  timeout: 30
  top_k: 20            # default per-call top-K; caller can override per request

# LLM relevance reranker (multi-query path). All knobs are overrideable per
# request; values here are defaults.
rerank:
  base_url_env: "SECONDARY_BASE_URL"
  api_key_env: "SECONDARY_API_KEY"
  model_env: "SECONDARY_MODEL_NAME"
  timeout_seconds: 30
  keep_cap: 24                 # final passage cap returned to the chatbot
  weak_per_sub_cap: 3          # max "weak" backfill per uncovered sub
  candidate_cap_global: 30     # cap on merged candidates fed to the LLM
  fallback_cosine_min: 0.50    # cosine safety-net threshold on LLM failure

# Instruction-based retrieval (replaces LLM reranker with instruction
# prefix + cosine threshold + token budget).
retrieval:
  use_instruction: true
  static_instruction: ""              # empty = use dynamic LLM-generated instruction
  cosine_threshold: 0.70
  token_budget: 28000
  top_k_fetch: 50
  # Dynamic instruction generation (fallback when static_instruction is empty).
  instruction_temperature: 0.2
  instruction_max_tokens: 128
  instruction_timeout_seconds: 5.0
