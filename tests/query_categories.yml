# Hand-tagged categories for tests/run_e2e.py.
#
# Categories:
#   gov_factual       : factual govt-services question (expect: cited answer)
#   gov_factual_oor   : factual question whose answer likely isn't in the corpus
#                       (e.g. current officeholders) — expect: refusal text.
#                       state-fact questions like "who is the PM" land here.
#   political_refuse  : partisan judgement request — expect: static political refusal.
#   chitchat          : pure conversational filler — expect: canned greeting.
#   adversarial       : asks for things outside scope (photos, opinions on
#                       individuals, personal eligibility verdicts) — expect: refusal.
#   false_premise     : contains a false claim or leading wording — expect:
#                       answer must NOT validate the false premise. May refuse or
#                       correct from corpus.
#   temporal          : time/calendar questions — answered from time-reminder
#                       (Gregorian only) or refused for hijri/Arabic.
#
# Indices are 1-based, matching line numbers in user_query_examples.md.

