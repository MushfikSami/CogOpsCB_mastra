# ===================================================================
# GovOps Graphiti Agent Configuration (v2)
# ===================================================================

# --- Agent Identity ---
agent_name: "আশা"
agent_story: "আমি বাংলাদেশ সরকারের নাগরিকদের সহায়তা করার জন্য ডিজাইন করা একটি ডিজিটাল উদ্যোগ। আমার লক্ষ্য হলো সরকারি সেবা সংক্রান্ত তথ্য আপনার জন্য সহজলভ্য করে তোলা। jiggasha.ai এর মাধ্যমে, আমি আপনাকে বিভিন্ন সরকারি সেবা, নীতিমালা, এবং প্রক্রিয়া সম্পর্কে তথ্য প্রদান করতে পারি। আমি আপনার প্রশ্নের উত্তর দিতে, নির্দেশনা প্রদান করতে, এবং প্রাসঙ্গিক তথ্য খুঁজে পেতে সাহায্য করতে প্রস্তুত। আসুন, একসাথে বাংলাদেশের নাগরিক সেবার উন্নয়নে কাজ করি!"

# --- LLM Service Mappings ---
# Maps the logic to the keys in your .env file
llm_service:
  api_key_env: "VLLM_API_KEY"
  model_name_env: "VLLM_MODEL_NAME"
  base_url_env: "VLLM_BASE_URL"
  max_context_tokens: 32000

# --- Conversation Management ---
conversation:
  history_window: 10  # Number of exchanges to retain in memory

# --- Graphiti Search Configuration ---
# Parameters used by graphiti_tools.py
graph_search:
  limit: 5             # Maximum number of facts to retrieve from the graph
  min_score: 0.8      # Minimum similarity score for vector search within the graph

# --- Token & Prompt Management ---
# Controls how the final prompt is assembled in graphiti_agents.py
token_management:
  tokenizer_model_env: "TOKENIZER_MODEL_NAME"
  system_prompt_reservation: 1600  # Tokens reserved for the heavy SOP instructions
  history_budget: 0.3              # 30% of remaining space allocated to history
  # Remaining 70% is automatically allocated to tool results (graph facts)

# --- LLM Generation Parameters ---
# Controls the final answer synthesis
llm_call_parameters:
  temperature: 0.1
  max_tokens: 2048
  repetition_penalty: 1.1

# --- UX Response Templates ---
response_templates:
  error_fallback: "একটি প্রযুক্তিগত ত্রুটির কারণে আমি এই মুহূর্তে সাহায্য করতে পারছি না। অনুগ্রহ করে কিছুক্ষণ পর আবার চেষ্টা করুন।"
  tool_failure: "দুঃখিত, তথ্যভাণ্ডার থেকে তথ্য সংগ্রহ করতে সমস্যা হচ্ছে। দয়া করে একটু পর আবার জিজ্ঞাসা করুন।"
  no_info_found: "দুঃখিত, এই বিষয়ে আমার কাছে বর্তমানে কোনো সঠিক সরকারি তথ্য নেই।"
  safety_violation: "আপনার অনুরোধটি আমাদের নিরাপত্তা নীতিমালার পরিপন্থী। আমি শুধুমাত্র সরকারি সেবা সংক্রান্ত তথ্য প্রদান করতে পারি।"