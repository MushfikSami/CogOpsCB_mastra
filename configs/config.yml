# ===================================================================
# CogOpsCB — Production Chatbot Configuration
# ===================================================================

# --- Agent Identity ---
agent:
  name: "আশা"
  story: "আমি বাংলাদেশ সরকারের নাগরিকদের জন্য একটি ডিজিটাল সহকারী। আমি সরকারি সেবা, নিয়মাবলি, ও প্রক্রিয়া সংক্রান্ত তথ্য খুঁজে এনে প্রমিত বাংলায় উপস্থাপন করি।"

# --- Primary LLM (Composer, 256K context) ---
llm:
  api_key_env: "LLM_API_KEY"
  model_name_env: "LLM_MODEL_NAME"
  base_url_env: "LLM_BASE_URL"
  max_context_tokens: 256000

# --- Secondary LLM (Router + LLM relevance filter + NLI verifier) ---
secondary:
  api_key_env: "SECONDARY_API_KEY"
  model_name_env: "SECONDARY_MODEL_NAME"
  base_url_env: "SECONDARY_BASE_URL"
  max_context_tokens: 128000

# --- Session / Redis ---
session:
  redis_url_env: "REDIS_URL"
  redis_url_default: "redis://localhost:6379/0"
  ttl_seconds_env: "REDIS_SESSION_TTL_SECONDS"
  ttl_default: 86400
  query_log_path: "data/query_log.jsonl"
  query_log_retention_days: 10

# --- Tools (Jiggasha is the sole retrieval source) ---
# Jiggasha's /search does instruction-based retrieval: embed + Qdrant +
# cosine threshold + token budget. The chatbot makes ONE POST per turn.
tools:
  enabled: [jiggasha]
  jiggasha:
    endpoint_env: JIGGASHA_ENDPOINT          # http://localhost:10000/search
    timeout_seconds: 45                        # Qdrant + retrieval in one call
    use_instruction: true                      # dynamic instruction + threshold + token budget
    top_k_fetch: 50                            # Qdrant fetch per sub-query (higher for threshold filtering)
    cosine_threshold: 0.70                     # min cosine score for instruction mode
    token_budget: 28000                        # max LLM tokens for retrieved passages

# --- Deterministic pipeline knobs (composer + disambiguation) ---
pipeline:
  composer:
    # Very low temperature — borderline retrieval cases produce mode-mixed
    # answers (procedure paragraph + bullet list) at higher temps. Keep ≤0.1
    # so the composer follows the ANSWER SHAPE rule deterministically.
    temperature: 0.1
    top_p: 0.95
    max_tokens: 2048
  disambiguation:
    # Fire when ≥ this many distinct (category, sub_category) tuples appear
    # in the yes/weak-set AND the normalized intent is short.
    min_distinct_services: 2
    short_query_token_cap: 8
    # Cap on how many candidate services to surface to the user — avoids
    # overwhelming "15 choices" answers for ultra-generic queries.
    candidate_cap: 6


# --- Retrieval / refusal text ---
retrieval:
  refusal_text_bn: "দুঃখিত, এই প্রশ্নের জন্য নির্ভরযোগ্য সরকারি তথ্য পাওয়া যায়নি।"
  political_refusal_text_bn: "আমি একটি নিরপেক্ষ সরকারি সেবা সহকারী। রাজনৈতিক বা ধর্মীয় বিষয়ে মতামত দেওয়া আমার পক্ষে সম্ভব নয়।"
  personal_law_refusal_text_bn: "এই প্রশ্নটি ব্যক্তিগত আইন বা ধর্মীয় বিধানের পরামর্শের বিষয় — এতে নির্ভরযোগ্য সরকারি সেবার তথ্য নেই। সঠিক উত্তরের জন্য সংশ্লিষ্ট বিশেষজ্ঞের (আইনজীবী, কাজী অফিস, বা মুফতি) সাথে পরামর্শ করুন।"
  input_invalid_refusal_bn: "দুঃখিত, প্রশ্নটি বোঝা গেল না বা সীমার বাইরে। অনুগ্রহ করে স্পষ্ট, সংক্ষিপ্ত প্রশ্ন করুন।"
  chitchat_greeting_bn: "স্বাগতম! আমি বাংলাদেশ সরকারের সেবা সম্পর্কিত প্রশ্নে সাহায্য করতে পারি — যেমন এনআইডি, পাসপোর্ট, ট্যাক্স, সনদ, ইত্যাদি। আপনি কোন বিষয়ে জানতে চান?"

# --- NLI verifier (Stage 4 post-flight; non-blocking) ---
verifier:
  enabled: true              # 117/117 e2e gate passed; enabling redact policy
  policy: redact             # redact | refuse | warn
  timeout_seconds: 6

# --- Reasoning (legacy ReAct loop; retained only for unit-test compatibility) ---
reasoning:
  max_turns: 1
  max_concurrent_query: 2
